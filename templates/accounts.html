<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账户资产 - 财务系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/entry.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>财务系统</h1>
            <nav>
                <a href="/finapp/">首页</a>
                <a href="/finapp/entry">录入</a>
                <a href="/finapp/accounts" class="active">账户资产</a>
                <a href="/finapp/reports">报表</a>
                <a href="/finapp/export">导出</a>
                {% if current_user.is_authenticated %}
                <a href="/finapp/users">用户</a>
                <a href="/finapp/logout" style="float: right;">注销</a>
                <span style="float: right; margin-left: 20px; color: white;">欢迎，{{ current_user.username }}</span>
                {% endif %}
            </nav>
        </header>

        <main>
            <section class="stats-section">
                <h2>账户概览</h2>
                <div class="stats-grid" id="accounts-overview">
                    <div style="padding:20px;color:#999;">加载中...</div>
                </div>
            </section>

            <section class="entry-section">
                <h2>账户列表</h2>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>账户名称</th>
                                <th>类型</th>
                                <th>期初余额</th>
                                <th>当前余额</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="accounts-table">
                            <tr><td colspan="6" style="text-align:center;color:#999;">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="entry-card" style="margin-top: 30px;">
                <h2 id="form-title">新增账户</h2>
                <form id="account-form" class="entry-form">
                    <input type="hidden" name="id" id="account-id">
                    <div class="form-row">
                        <div class="form-group">
                            <label>账户名称 <span class="required">*</span></label>
                            <input type="text" name="name" id="account-name" required placeholder="如：微信钱包、银行账户">
                        </div>
                        <div class="form-group">
                            <label>账户类型</label>
                            <select name="account_type" id="account-type">
                                <option value="银行账户">银行账户</option>
                                <option value="微信钱包">微信钱包</option>
                                <option value="支付宝">支付宝</option>
                                <option value="现金">现金</option>
                                <option value="证券账户">证券账户</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>期初余额</label>
                            <input type="number" name="initial_balance" id="account-initial" step="0.01" value="0" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>备注</label>
                            <input type="text" name="remark" id="account-remark" placeholder="选填">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="submit-btn">添加账户</button>
                        <button type="button" class="btn-secondary" onclick="resetForm()">重置</button>
                    </div>
                </form>
            </section>

            <section style="margin-top: 30px; background: #fff3cd; border-radius: 8px; padding: 20px;">

            </section>
        </main>

        <footer>
            <p>&copy; 2025 财务系统</p>
        </footer>
    </div>

    <!-- 编辑弹窗 -->
    <div id="edit-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>编辑账户</h2>
            <form id="edit-form" class="entry-form">
                <input type="hidden" name="id" id="edit-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>账户名称 <span class="required">*</span></label>
                        <input type="text" name="name" id="edit-name" required>
                    </div>
                    <div class="form-group">
                        <label>账户类型</label>
                        <select name="account_type" id="edit-type">
                            <option value="银行账户">银行账户</option>
                            <option value="微信钱包">微信钱包</option>
                            <option value="支付宝">支付宝</option>
                            <option value="现金">现金</option>
                            <option value="证券账户">证券账户</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>期初余额</label>
                        <input type="number" name="initial_balance" id="edit-initial" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" name="remark" id="edit-remark">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">保存</button>
                    <button type="button" class="btn-secondary" onclick="closeEditModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // API基础路径 - 所有请求通过nginx代理到 /finapp/api/
        var API_BASE = '/finapp/api';

        var accounts = [];

        async function apiFetch(path, options) {
            var url = API_BASE + path;
            var resp = await fetch(url, {
                credentials: 'include',
                headers: {'Content-Type': 'application/json'},
                ...options
            });
            if (resp.status === 302 || resp.redirected) {
                // Session过期，重定向到登录
                window.location.href = '/finapp/login?next=' + encodeURIComponent(window.location.pathname);
                throw new Error('SESSION_EXPIRED');
            }
            if (!resp.ok) {
                var err = await resp.text();
                throw new Error('API Error ' + resp.status + ': ' + err);
            }
            return resp.json();
        }

        async function loadAccounts() {
            try {
                accounts = await apiFetch('/accounts');
                renderAccounts();
                renderOverview();
            } catch (e) {
                if (e.message === 'SESSION_EXPIRED') return;
                console.error('loadAccounts error:', e);
                showToast('加载账户失败: ' + e.message, 'error');
            }
        }

        function renderOverview() {
            var total = accounts.reduce(function(sum, a) { return sum + a.current_balance; }, 0);
            var container = document.getElementById('accounts-overview');
            var typeGroups = {};
            accounts.forEach(function(a) {
                var t = a.account_type || '其他';
                if (!typeGroups[t]) typeGroups[t] = 0;
                typeGroups[t] += a.current_balance;
            });

            var html = '<div class="stat-card balance"><div class="stat-value">¥' + total.toFixed(2) + '</div><div class="stat-label">总资产</div></div>';
            for (var type in typeGroups) {
                html += '<div class="stat-card income"><div class="stat-value">¥' + typeGroups[type].toFixed(2) + '</div><div class="stat-label">' + type + '</div></div>';
            }
            container.innerHTML = html;
        }

        function renderAccounts() {
            var tbody = document.getElementById('accounts-table');
            if (accounts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">暂无账户，请添加</td></tr>';
                return;
            }
            var html = '';
            accounts.forEach(function(a) {
                var colorStyle = a.current_balance >= 0 ? '#27ae60' : '#e74c3c';
                html += '<tr>' +
                    '<td><strong>' + escHtml(a.name) + '</strong></td>' +
                    '<td>' + escHtml(a.account_type || '-') + '</td>' +
                    '<td>¥' + a.initial_balance.toFixed(2) + '</td>' +
                    '<td style="font-weight:bold;color:' + colorStyle + '">¥' + a.current_balance.toFixed(2) + '</td>' +
                    '<td>' + escHtml(a.remark || '-') + '</td>' +
                    '<td><button class="btn-primary btn-sm" onclick="editAccount(' + a.id + ')">编辑</button> <button class="btn-danger btn-sm" onclick="deleteAccount(' + a.id + ')">删除</button></td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
        }

        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        document.getElementById('account-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var formData = new FormData(this);
            var data = {};
            data.name = formData.get('name');
            data.account_type = formData.get('account_type');
            data.initial_balance = parseFloat(formData.get('initial_balance')) || 0;
            data.remark = formData.get('remark');

            var id = document.getElementById('account-id').value;
            try {
                if (id) {
                    await apiFetch('/accounts/' + id, {method: 'PUT', body: JSON.stringify(data)});
                    showToast('账户更新成功');
                } else {
                    await apiFetch('/accounts', {method: 'POST', body: JSON.stringify(data)});
                    showToast('账户添加成功');
                }
                resetForm();
                loadAccounts();
            } catch (e) {
                if (e.message !== 'SESSION_EXPIRED') showToast('操作失败: ' + e.message, 'error');
            }
        });

        function editAccount(id) {
            var a = accounts.find(function(x) { return x.id === id; });
            if (!a) return;
            document.getElementById('account-id').value = a.id;
            document.getElementById('account-name').value = a.name;
            document.getElementById('account-type').value = a.account_type || '银行账户';
            document.getElementById('account-initial').value = a.initial_balance;
            document.getElementById('account-remark').value = a.remark || '';
            document.getElementById('submit-btn').textContent = '更新账户';
            document.getElementById('form-title').textContent = '编辑账户';
            document.getElementById('account-name').scrollIntoView({behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('account-form').reset();
            document.getElementById('account-id').value = '';
            document.getElementById('submit-btn').textContent = '添加账户';
            document.getElementById('form-title').textContent = '新增账户';
            document.getElementById('account-initial').value = '0';
        }

        async function deleteAccount(id) {
            if (!confirm('确定删除该账户？删除后不可恢复。')) return;
            try {
                var result = await apiFetch('/accounts/' + id, {method: 'DELETE'});
                showToast('删除成功');
                loadAccounts();
            } catch (e) {
                if (e.message !== 'SESSION_EXPIRED') showToast('删除失败: ' + e.message, 'error');
        }
        }

        function showToast(msg, type) {
            type = type || 'success';
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 3000);
        }

        // 页面加载时自动获取账户列表
        document.addEventListener('DOMContentLoaded', loadAccounts);
    </script>
</body>
</html>
