<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码 - 财务系统</title>
    <link href="https://cdn.jsdelivr.net/npm/zui@3/dist/css/zui.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #f5f5f5; }
        .change-pwd-container {
            max-width: 400px;
            margin: 80px auto;
            background: #fff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,.1);
        }
        .change-pwd-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #374151;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #6b7280;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,.15);
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover { background: #2563eb; }
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-back:hover { color: #3b82f6; }
        .msg { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .msg-success { background: #dcfce7; color: #166534; }
        .msg-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>财务系统</h1>
            <nav>
                <a href="{{ url_for('index') }}">首页</a>
                <a href="{{ url_for('entry') }}">录入</a>
                <a href="{{ url_for('accounts_page') }}">账户</a>
                <a href="{{ url_for('reports') }}">报表</a>
                <a href="{{ url_for('export') }}">导出</a>
                <a href="{{ url_for('users') }}">用户</a>
                <a href="{{ url_for('change_password_page') }}" class="active">密码</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}" style="float: right;" onclick="return confirmLogout()">注销</a>
                <span style="float: right; margin-left: 20px; color: white;">欢迎，{{ current_user.username }}</span>
                {% else %}
                <a href="{{ url_for('login') }}" style="float: right;">登录</a>
                {% endif %}
            </nav>
        </header>
    </div>
    
    <div class="change-pwd-container">
        <h2>🔐 密码</h2>
        <div id="msg-box" style="display:none;"></div>
        <form id="pwd-form">
            <div class="form-group">
                <label>旧密码</label>
                <input type="password" id="old_password" required autocomplete="current-password">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="new_password" required minlength="6" autocomplete="new-password" placeholder="至少6位">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirm_password" required minlength="6" autocomplete="new-password" placeholder="再输入一次">
            </div>
            <button type="submit" class="btn-submit">确认修改</button>
        </form>
        <a href="{{ url_for('index') }}" class="btn-back">← 返回首页</a>
    </div>

    <script>
    document.getElementById('pwd-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var oldPwd = document.getElementById('old_password').value;
        var newPwd = document.getElementById('new_password').value;
        var confirmPwd = document.getElementById('confirm_password').value;
        var msgBox = document.getElementById('msg-box');

        if (newPwd !== confirmPwd) {
            msgBox.className = 'msg msg-error';
            msgBox.textContent = '两次新密码不一致';
            msgBox.style.display = 'block';
            return;
        }

        var resp = await fetch('/finapp/api/change-password', {
            method: 'POST',
            credentials: 'include',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                old_password: oldPwd,
                new_password: newPwd,
                confirm_password: confirmPwd
            })
        });
        var data = await resp.json();

        if (data.success) {
            msgBox.className = 'msg msg-success';
            msgBox.textContent = '✓ 密码修改成功，即将返回首页...';
            msgBox.style.display = 'block';
            setTimeout(function() { window.location.href = '/finapp'; }, 1500);
        } else {
            msgBox.className = 'msg msg-error';
            msgBox.textContent = '✗ ' + data.message;
            msgBox.style.display = 'block';
        }
    });
    </script>
</body>
</html>
