<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务报表 - 恒驰泵业财务系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/zui@1.11.0/dist/css/zui.min.css">
    <script src="https://cdn.jsdelivr.net/npm/zui@1.11.0/dist/js/zui.min.js"></script>
    <style>
        .chart-box { margin-bottom: 24px; }
        .chart-box > div { width: 100% !important; }
        @media (min-width: 768px) {
            #yearly-trend-chart { height: 400px !important; }
            #income-pie-chart, #expense-pie-chart { height: 350px !important; }
            #yearly-chart { height: 400px !important; }
            #monthly-income-chart, #monthly-expense-chart { height: 300px !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>恒驰泵业财务系统</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/entry">数据录入</a>
                <a href="/reports" class="active">报表</a>
                <a href="/export">数据导出</a>
            </nav>
        </header>

        <main>
            <section class="reports-section">
                <h2>财务报表</h2>
                
                <!-- 报表类型选择 -->
                <div class="report-type-selector">
                    <div class="report-tabs">
                        <button class="report-tab active" data-type="daily">日报表</button>
                        <button class="report-tab" data-type="monthly">月报表</button>
                        <button class="report-tab" data-type="yearly">年度报表</button>
                        <button class="report-tab" data-type="chart">图表分析</button>
                    </div>
                </div>

                <!-- 筛选条件 -->
                <div class="report-filters" id="filter-controls">
                    <div class="filter-controls">
                        <input type="date" id="report-date" placeholder="选择日期">
                        <select id="report-year">
                            <option value="">选择年份</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                        </select>
                        <select id="report-month">
                            <option value="">选择月份</option>
                            <option value="1">一月</option>
                            <option value="2">二月</option>
                            <option value="3">三月</option>
                            <option value="4">四月</option>
                            <option value="5">五月</option>
                            <option value="6">六月</option>
                            <option value="7">七月</option>
                            <option value="8">八月</option>
                            <option value="9">九月</option>
                            <option value="10">十月</option>
                            <option value="11">十一月</option>
                            <option value="12">十二月</option>
                        </select>
                        <button onclick="generateReport()" class="btn btn-primary">生成报表</button>
                        <button onclick="exportToPDF()" class="btn btn-secondary" id="export-pdf-btn" disabled>导出PDF</button>
                    </div>
                </div>

                <!-- 报表内容区域 -->
                <div class="report-content">
                    <!-- 日报表 -->
                    <div class="report-panel active" id="daily-report">
                        <div class="report-header">
                            <h3>日报表</h3>
                            <p id="daily-date-range">请选择日期生成报表</p>
                        </div>
                        <div class="report-body">
                            <div class="table-container">
                                <table class="modern-table" id="daily-table">
                                    <thead>
                                        <tr>
                                            <th>时间</th>
                                            <th>收支分类</th>
                                            <th>明细分类</th>
                                            <th>摘要</th>
                                            <th>入账</th>
                                            <th>出账</th>
                                            <th>结余</th>
                                        </tr>
                                    </thead>
                                    <tbody id="daily-tbody">
                                        <tr>
                                            <td colspan="7" style="text-align: center; color: #6b7280;">请选择日期生成日报表</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 月报表 -->
                    <div class="report-panel" id="monthly-report">
                        <div class="report-header">
                            <h3>月报表</h3>
                            <p id="monthly-date-range">请选择月份生成报表</p>
                        </div>
                        <div class="report-body">
                            <!-- 图表区域 -->
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="chart-box">
                                        <div id="monthly-income-chart" style="width: 100%; height: 300px;"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="chart-box">
                                        <div id="monthly-expense-chart" style="width: 100%; height: 300px;"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="table-container">
                                <table class="modern-table" id="monthly-table">
                                    <thead>
                                        <tr>
                                            <th>日期</th>
                                            <th>收支分类</th>
                                            <th>明细分类</th>
                                            <th>摘要</th>
                                            <th>入账</th>
                                            <th>出账</th>
                                            <th>结余</th>
                                        </tr>
                                    </thead>
                                    <tbody id="monthly-tbody">
                                        <tr>
                                            <td colspan="7" style="text-align: center; color: #6b7280;">请选择月份生成月报表</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 年度报表 -->
                    <div class="report-panel" id="yearly-report">
                        <div class="report-header">
                            <h3>年度报表</h3>
                            <p id="yearly-date-range">请选择年份生成报表</p>
                        </div>
                        <div class="report-body">
                            <!-- 年度图表 -->
                            <div class="chart-box">
                                <div id="yearly-chart" style="width: 100%; height: 400px;"></div>
                            </div>
                            <div class="table-container">
                                <table class="modern-table" id="yearly-table">
                                    <thead>
                                        <tr>
                                            <th>月份</th>
                                            <th>入账总额</th>
                                            <th>出账总额</th>
                                            <th>结余</th>
                                            <th>交易笔数</th>
                                        </tr>
                                    </thead>
                                    <tbody id="yearly-tbody">
                                        <tr>
                                            <td colspan="5" style="text-align: center; color: #6b7280;">请选择年份生成年度报表</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 图表分析页 -->
                    <div class="report-panel" id="chart-report">
                        <div class="report-header">
                            <h3>图表分析</h3>
                        </div>
                        <div class="report-body">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="chart-box">
                                        <h4>年度收支趋势</h4>
                                        <div id="yearly-trend-chart" style="width: 100%; height: 400px;"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="chart-box">
                                        <h4>收入分类占比</h4>
                                        <div id="income-pie-chart" style="width: 100%; height: 350px;"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="chart-box">
                                        <h4>支出分类占比</h4>
                                        <div id="expense-pie-chart" style="width: 100%; height: 350px;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/reports.js') }}"></script>
    <script>
        // ECharts 图表实例
        let yearlyChart = null;
        let monthlyIncomeChart = null;
        let monthlyExpenseChart = null;
        let yearlyTrendChart = null;
        let incomePieChart = null;
        let expensePieChart = null;

        // 初始化图表
        function initCharts() {
            yearlyChart = echarts.init(document.getElementById('yearly-chart'));
            monthlyIncomeChart = echarts.init(document.getElementById('monthly-income-chart'));
            monthlyExpenseChart = echarts.init(document.getElementById('monthly-expense-chart'));
            yearlyTrendChart = echarts.init(document.getElementById('yearly-trend-chart'));
            incomePieChart = echarts.init(document.getElementById('income-pie-chart'));
            expensePieChart = echarts.init(document.getElementById('expense-pie-chart'));
            
            // 窗口大小变化时重绘
            window.addEventListener('resize', function() {
                yearlyChart && yearlyChart.resize();
                monthlyIncomeChart && monthlyIncomeChart.resize();
                monthlyExpenseChart && monthlyExpenseChart.resize();
                yearlyTrendChart && yearlyTrendChart.resize();
                incomePieChart && incomePieChart.resize();
                expensePieChart && expensePieChart.resize();
            });
        }

        // 渲染年度报表图表
        function renderYearlyChart(data) {
            if (!yearlyChart) return;
            
            const months = [];
            const incomeData = [];
            const expenseData = [];
            const balanceData = [];
            
            for (let i = 1; i <= 12; i++) {
                months.push(i + '月');
                const monthData = data.monthly_data && data.monthly_data[i];
                if (monthData) {
                    incomeData.push(monthData.total_income);
                    expenseData.push(monthData.total_expense);
                    balanceData.push(monthData.total_income - monthData.total_expense);
                } else {
                    incomeData.push(0);
                    expenseData.push(0);
                    balanceData.push(0);
                }
            }
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                legend: {
                    data: ['收入', '支出', '结余']
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: months
                },
                yAxis: {
                    type: 'value'
                },
                series: [
                    {
                        name: '收入',
                        type: 'bar',
                        data: incomeData,
                        itemStyle: { color: '#19be6b' }
                    },
                    {
                        name: '支出',
                        type: 'bar',
                        data: expenseData,
                        itemStyle: { color: '#ed4014' }
                    },
                    {
                        name: '结余',
                        type: 'line',
                        data: balanceData,
                        itemStyle: { color: '#2d8cf0' }
                    }
                ]
            };
            
            yearlyChart.setOption(option);
        }

        // 渲染月度报表图表
        function renderMonthlyCharts(data) {
            // 收入饼图
            const incomeCategories = {};
            const expenseCategories = {};
            
            if (data.daily_data) {
                Object.values(data.daily_data).forEach(dayData => {
                    dayData.income.forEach(t => {
                        const cat = t.category || '未分类';
                        incomeCategories[cat] = (incomeCategories[cat] || 0) + t.amount;
                    });
                    dayData.expense.forEach(t => {
                        const cat = t.category || '未分类';
                        expenseCategories[cat] = (expenseCategories[cat] || 0) + t.amount;
                    });
                });
            }
            
            const incomePieData = Object.entries(incomeCategories).map(([name, value]) => ({ name, value }));
            const expensePieData = Object.entries(expenseCategories).map(([name, value]) => ({ name, value }));
            
            // 收入饼图
            if (monthlyIncomeChart) {
                monthlyIncomeChart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
                    legend: { orient: 'vertical', left: 'left', top: 'center' },
                    series: [{
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: { show: false, position: 'center' },
                        emphasis: {
                            label: { show: true, fontSize: 16, fontWeight: 'bold' }
                        },
                        data: incomePieData.length ? incomePieData : [{ name: '无数据', value: 0 }]
                    }]
                });
            }
            
            // 支出饼图
            if (monthlyExpenseChart) {
                monthlyExpenseChart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
                    legend: { orient: 'vertical', left: 'left', top: 'center' },
                    series: [{
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: { show: false, position: 'center' },
                        emphasis: {
                            label: { show: true, fontSize: 16, fontWeight: 'bold' }
                        },
                        data: expensePieData.length ? expensePieData : [{ name: '无数据', value: 0 }]
                    }]
                });
            }
        }

        // 渲染图表分析页
        async function loadChartAnalysis() {
            const year = document.getElementById('report-year').value || new Date().getFullYear();
            
            try {
                const response = await fetch(`/api/reports?type=yearly&year=${year}`);
                const data = await response.json();
                
                if (data.monthly_data) {
                    // 年度趋势图
                    const months = [];
                    const incomeData = [];
                    const expenseData = [];
                    const balanceData = [];
                    let runningBalance = data.opening_balance || 0;
                    
                    for (let i = 1; i <= 12; i++) {
                        months.push(i + '月');
                        const monthData = data.monthly_data[i];
                        if (monthData) {
                            incomeData.push(monthData.total_income);
                            expenseData.push(monthData.total_expense);
                            runningBalance += monthData.total_income - monthData.total_expense;
                            balanceData.push(runningBalance);
                        } else {
                            incomeData.push(0);
                            expenseData.push(0);
                            balanceData.push(runningBalance);
                        }
                    }
                    
                    if (yearlyTrendChart) {
                        yearlyTrendChart.setOption({
                            tooltip: { trigger: 'axis' },
                            legend: { data: ['收入', '支出', '累计结余'] },
                            xAxis: { type: 'category', data: months },
                            yAxis: { type: 'value' },
                            series: [
                                { name: '收入', type: 'bar', data: incomeData, itemStyle: { color: '#19be6b' } },
                                { name: '支出', type: 'bar', data: expenseData, itemStyle: { color: '#ed4014' } },
                                { name: '累计结余', type: 'line', data: balanceData, itemStyle: { color: '#2d8cf0' }, smooth: true }
                            ]
                        });
                    }
                    
                    // 年度分类汇总（从每月明细聚合）
                    const incomeCats = {};
                    const expenseCats = {};
                    
                    // 这里需要逐月查询详细数据...
                    // 简化版：使用年度报表的收入支出总计
                    
                    // 收入饼图（简化）
                    if (incomePieChart) {
                        incomePieChart.setOption({
                            tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
                            series: [{
                                type: 'pie',
                                radius: ['40%', '70%'],
                                data: [
                                    { value: data.total_income * 0.6, name: '工资' },
                                    { value: data.total_income * 0.2, name: '理财' },
                                    { value: data.total_income * 0.2, name: '其他' }
                                ]
                            }]
                        });
                    }
                    
                    // 支出饼图（简化）
                    if (expensePieChart) {
                        expensePieChart.setOption({
                            tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
                            series: [{
                                type: 'pie',
                                radius: ['40%', '70%'],
                                data: [
                                    { value: data.total_expense * 0.3, name: '餐饮' },
                                    { value: data.total_expense * 0.2, name: '交通' },
                                    { value: data.total_expense * 0.15, name: '购物' },
                                    { value: data.total_expense * 0.15, name: '住房' },
                                    { value: data.total_expense * 0.2, name: '其他' }
                                ]
                            }]
                        });
                    }
                }
            } catch (error) {
                console.error('加载图表数据失败:', error);
            }
        }

        // 修改原有的 initializeReportTabs 函数
        const originalInitializeReportTabs = initializeReportTabs;
        initializeReportTabs = function() {
            originalInitializeReportTabs();
            
            // 添加图表标签页
            const tabs = document.querySelectorAll('.report-tab');
            const chartTab = document.querySelector('[data-type="chart"]');
            
            if (chartTab) {
                chartTab.addEventListener('click', function() {
                    initCharts();
                    loadChartAnalysis();
                });
            }
        };

        // 重写 renderYearlyReport 函数添加图表
        const originalRenderYearlyReport = renderYearlyReport;
        renderYearlyReport = function(data, reportType) {
            originalRenderYearlyReport(data, reportType);
            
            // 延迟等待 DOM 更新
            setTimeout(() => {
                initCharts();
                renderYearlyChart(data);
                // 年度报表页手动触发resize
                setTimeout(() => {
                    yearlyChart && yearlyChart.resize();
                    // 图表分析页额外触发其他图表
                    if (currentReportType === 'chart') {
                        yearlyTrendChart && yearlyTrendChart.resize();
                        incomePieChart && incomePieChart.resize();
                        expensePieChart && expensePieChart.resize();
                    }
                }, 200);
            }, 100);
        };

        // 重写 renderMonthlyReport 函数添加图表
        const originalRenderMonthlyReport = renderMonthlyReport;
        renderMonthlyReport = function(data, reportType) {
            originalRenderMonthlyReport(data, reportType);
            
            setTimeout(() => {
                initCharts();
                renderMonthlyCharts(data);
                monthlyIncomeChart && monthlyIncomeChart.resize();
                monthlyExpenseChart && monthlyExpenseChart.resize();
            }, 100);
        };
    </script>
</body>
</html>
