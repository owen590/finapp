<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恒驰泵业财务系统</title>
    <!-- ZUI 3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/zui@1.11.0/dist/css/zui.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/entry.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pagination.css') }}">
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            border-radius: 16px; padding: 24px; color: white; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card.income { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .stat-card.expense { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .stat-card.balance { background: linear-gradient(135deg, #4776E6 0%, #8E54E9 100%); }
        .stat-value { font-size: 32px; font-weight: bold; margin-bottom: 8px; }
        .stat-label { font-size: 16px; opacity: 0.9; }
        
        .chart-section { margin-bottom: 30px; }
        .chart-card { 
            background: white; border-radius: 16px; padding: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .chart-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #333; }
        
        .table-actions { display: flex; gap: 8px; }
        .table-actions .btn { padding: 4px 12px; font-size: 12px; }
        
        /* 增强的表格样式 */
        .table-container { 
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .table thead th { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 14px;
        }
        .table tbody tr:hover { background: #f8f9ff; }
        .table tbody td { padding: 12px; border-color: #eee; }
        
        .type-badge { 
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
        }
        .type-badge.入账 { background: #e8f8f0; color: #11998e; }
        .type-badge.出账 { background: #fde8e8; color: #eb3349; }
        
        .amount.入账 { color: #11998e; font-weight: 600; }
        .amount.出账 { color: #eb3349; font-weight: 600; }
        
        /* Quick date filters */
        .quick-filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .quick-filter { 
            padding: 8px 16px; border-radius: 20px; border: 1px solid #ddd;
            background: white; cursor: pointer; transition: all 0.3s;
        }
        .quick-filter:hover, .quick-filter.active { 
            background: #667eea; color: white; border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>恒驰泵业财务系统</h1>
            <nav>
                <a href="/" class="active">首页</a>
                <a href="/entry">录入</a>
                <a href="/reports">报表</a>
                <a href="/export">导出</a>
            </nav>
        </header>

        <main>
            <!-- 统计卡片 -->
            <section class="stats-section">
                <h2>财务概览</h2>
                <div class="stats-grid">
                    <div class="stat-card income">
                        <div class="stat-value" id="total-income">¥0.00</div>
                        <div class="stat-label">总收入</div>
                    </div>
                    <div class="stat-card expense">
                        <div class="stat-value" id="total-expense">¥0.00</div>
                        <div class="stat-label">总支出</div>
                    </div>
                    <div class="stat-card balance">
                        <div class="stat-value" id="balance">¥0.00</div>
                        <div class="stat-label">结余</div>
                    </div>
                </div>
            </section>

            <!-- 图表区域 -->
            <section class="chart-section">
                <div class="row">
                    <div class="col-md-8">
                        <div class="chart-card">
                            <div class="chart-title">收支趋势（近6个月）</div>
                            <div id="trend-chart" style="width: 100%; height: 300px;"></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="chart-card">
                            <div class="chart-title">收支构成</div>
                            <div id="pie-chart" style="width: 100%; height: 300px;"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 筛选条件 -->
            <section class="filter-section">
                <h2>筛选条件</h2>
                <div class="quick-filters">
                    <button class="quick-filter" onclick="setQuickFilter('today')">今天</button>
                    <button class="quick-filter" onclick="setQuickFilter('week')">本周</button>
                    <button class="quick-filter" onclick="setQuickFilter('month')">本月</button>
                    <button class="quick-filter" onclick="setQuickFilter('year')">本年</button>
                </div>
                <div class="filter-controls">
                    <input type="date" id="start-date" placeholder="开始日期">
                    <input type="date" id="end-date" placeholder="结束日期">
                    <select id="year-filter">
                        <option value="">全部年份</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                    <select id="month-filter">
                        <option value="">全部月份</option>
                        <option value="1">一月</option>
                        <option value="2">二月</option>
                        <option value="3">三月</option>
                        <option value="4">四月</option>
                        <option value="5">五月</option>
                        <option value="6">六月</option>
                        <option value="7">七月</option>
                        <option value="8">八月</option>
                        <option value="9">九月</option>
                        <option value="10">十月</option>
                        <option value="11">十一月</option>
                        <option value="12">十二月</option>
                    </select>
                    <select id="type-filter">
                        <option value="">全部收支</option>
                        <option value="入账">入账</option>
                        <option value="出账">出账</option>
                    </select>
                    <button onclick="applyFilter()" class="btn btn-primary">查询</button>
                    <button onclick="resetFilter()" class="btn btn-secondary">重置</button>
                </div>
            </section>

            <!-- 交易列表 -->
            <section class="recent-transactions">
                <h2>交易记录</h2>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>类型</th>
                                <th>分类</th>
                                <th>摘要</th>
                                <th>金额</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-table">
                        </tbody>
                    </table>
                </div>
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 编辑弹窗 -->
    <div id="edit-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>编辑交易</h2>
            <form id="edit-form" class="entry-form">
                <input type="hidden" name="id">
                <div class="form-row">
                    <div class="form-group">
                        <label>日期 <span class="required">*</span></label>
                        <input type="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label>类型 <span class="required">*</span></label>
                        <select name="type" required>
                            <option value="">请选择</option>
                            <option value="入账">入账</option>
                            <option value="出账">出账</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>明细分类</label>
                        <input type="text" name="category" list="category-list-edit" placeholder="输入或选择">
                        <datalist id="category-list-edit">
                            <option value="投资款">
                            <option value="货款">
                            <option value="电费">
                            <option value="快递费">
                            <option value="工资">
                            <option value="充值">
                            <option value="设备">
                            <option value="材料">
                            <option value="费用">
                            <option value="房租">
                            <option value="其他">
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label>金额 <span class="required">*</span></label>
                        <input type="number" name="amount" step="0.01" min="0" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>摘要</label>
                        <textarea name="description" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>备注</label>
                        <textarea name="remark" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">保存</button>
                    <button type="button" class="btn-secondary" onclick="closeEditModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pagination.js') }}"></script>
    <script>
        let trendChart = null;
        let pieChart = null;

        // 初始化图表
        function initCharts() {
            trendChart = echarts.init(document.getElementById('trend-chart'));
            pieChart = echarts.init(document.getElementById('pie-chart'));
            
            window.addEventListener('resize', function() {
                trendChart && trendChart.resize();
                pieChart && pieChart.resize();
            });
        }

        // 加载图表数据
        async function loadChartData() {
            try {
                const year = new Date().getFullYear();
                const response = await fetch(`/api/reports?type=yearly&year=${year}`);
                const data = await response.json();
                
                if (data.monthly_data) {
                    const months = [];
                    const incomeData = [];
                    const expenseData = [];
                    
                    for (let i = 1; i <= 12; i++) {
                        months.push(i + '月');
                        const m = data.monthly_data[i];
                        if (m) {
                            incomeData.push(m.total_income);
                            expenseData.push(m.total_expense);
                        } else {
                            incomeData.push(0);
                            expenseData.push(0);
                        }
                    }
                    
                    // 趋势图
                    if (trendChart) {
                        trendChart.setOption({
                            tooltip: { trigger: 'axis' },
                            legend: { data: ['收入', '支出'] },
                            xAxis: { type: 'category', data: months },
                            yAxis: { type: 'value' },
                            series: [
                                { name: '收入', type: 'bar', data: incomeData, itemStyle: { color: '#38ef7d' } },
                                { name: '支出', type: 'bar', data: expenseData, itemStyle: { color: '#f45c43' } }
                            ]
                        });
                    }
                    
                    // 饼图
                    if (pieChart) {
                        const totalIncome = data.total_income || 0;
                        const totalExpense = data.total_expense || 0;
                        pieChart.setOption({
                            tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
                            series: [{
                                type: 'pie',
                                radius: ['40%', '70%'],
                                data: [
                                    { value: totalIncome, name: '收入' },
                                    { value: totalExpense, name: '支出' }
                                ],
                                itemStyle: { 
                                    borderRadius: 10,
                                    borderColor: '#fff',
                                    borderWidth: 2
                                }
                            }]
                        });
                    }
                }
            } catch (error) {
                console.error('加载图表失败:', error);
            }
        }

        // 快捷筛选
        function setQuickFilter(type) {
            const today = new Date();
            let startDate, endDate;
            
            document.querySelectorAll('.quick-filter').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            switch(type) {
                case 'today':
                    startDate = endDate = today.toISOString().split('T')[0];
                    break;
                case 'week':
                    const weekStart = new Date(today);
                    weekStart.setDate(today.getDate() - today.getDay());
                    startDate = weekStart.toISOString().split('T')[0];
                    endDate = today.toISOString().split('T')[0];
                    break;
                case 'month':
                    startDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`;
                    endDate = today.toISOString().split('T')[0];
                    break;
                case 'year':
                    startDate = `${today.getFullYear()}-01-01`;
                    endDate = today.toISOString().split('T')[0];
                    break;
            }
            
            document.getElementById('start-date').value = startDate;
            document.getElementById('end-date').value = endDate;
            applyFilter();
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadSavedFilter();
            applyFilter();
            initCharts();
            loadChartData();
        });
        
        async function loadSummaryData(url = '/api/statistics') {
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (document.getElementById('total-income')) {
                    document.getElementById('total-income').textContent = '¥' + formatAmount(data.total_income);
                }
                if (document.getElementById('total-expense')) {
                    document.getElementById('total-expense').textContent = '¥' + formatAmount(data.total_expense);
                }
                if (document.getElementById('balance')) {
                    document.getElementById('balance').textContent = '¥' + formatAmount(data.balance);
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }
        
        async function loadFilteredTransactions(url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const tableBody = document.getElementById('transactions-table');
                if (tableBody) {
                    tableBody.innerHTML = '';
                    
                    data.transactions.forEach(transaction => {
                        const row = document.createElement('tr');
                        
                        const editBtn = document.createElement('button');
                        editBtn.className = 'btn btn-primary btn-sm';
                        editBtn.textContent = '编辑';
                        editBtn.onclick = function() { loadTransactionForEdit(transaction.id); };
                        
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn btn-danger btn-sm';
                        deleteBtn.textContent = '删除';
                        deleteBtn.onclick = function() { confirmDelete(transaction.id); };
                        
                        const actionCell = document.createElement('td');
                        const actionsContainer = document.createElement('div');
                        actionsContainer.className = 'table-actions';
                        actionsContainer.appendChild(editBtn);
                        actionsContainer.appendChild(deleteBtn);
                        actionCell.appendChild(actionsContainer);
                        
                        row.innerHTML = `
                            <td>${formatDate(transaction.date)}</td>
                            <td><span class="type-badge ${transaction.type}">${transaction.type}</span></td>
                            <td>${transaction.category || '-'}</td>
                            <td>${transaction.description || '-'}</td>
                            <td class="amount ${transaction.type}">${formatAmount(transaction.amount)}</td>
                            <td>${transaction.remark || '-'}</td>
                        `;
                        row.appendChild(actionCell);
                        tableBody.appendChild(row);
                    });
                }
                
                initPagination(data.current_page, data.pages);
            } catch (error) {
                console.error('加载交易失败:', error);
            }
        }
        
        async function confirmDelete(id) {
            if (confirm('确定删除这条记录吗？')) {
                try {
                    const response = await fetch('/api/transactions/' + id, { method: 'DELETE' });
                    if (response.ok) {
                        showToast('删除成功');
                        loadSummaryData();
                        applyFilter();
                    } else {
                        showToast('删除失败', 'error');
                    }
                } catch (error) {
                    showToast('删除失败', 'error');
                }
            }
        }
        
        function applyFilter() {
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const year = document.getElementById('year-filter').value;
            const month = document.getElementById('month-filter').value;
            const type = document.getElementById('type-filter').value;
            
            saveFilter();
            
            let url = '/api/transactions?per_page=50&page=1';
            let statsUrl = '/api/statistics';
            
            if (startDate) { url += '&start_date=' + startDate; statsUrl += '?start_date=' + startDate; }
            if (endDate) { url += '&end_date=' + endDate; statsUrl += (statsUrl.includes('?') ? '&' : '?') + 'end_date=' + endDate; }
            if (year) { url += '&year=' + year; statsUrl += (statsUrl.includes('?') ? '&' : '?') + 'year=' + year; }
            if (month) { url += '&month=' + month; statsUrl += (statsUrl.includes('?') ? '&' : '?') + 'month=' + month; }
            if (type) { url += '&type=' + type; statsUrl += (statsUrl.includes('?') ? '&' : '?') + 'type=' + type; }
            
            loadFilteredTransactions(url);
            loadSummaryData(statsUrl);
        }
        
        function resetFilter() {
            document.getElementById('start-date').value = '';
            document.getElementById('end-date').value = '';
            document.getElementById('year-filter').value = '';
            document.getElementById('month-filter').value = '';
            document.getElementById('type-filter').value = '';
            document.querySelectorAll('.quick-filter').forEach(btn => btn.classList.remove('active'));
            localStorage.removeItem('filter');
            loadSummaryData();
            loadFilteredTransactions('/api/transactions?per_page=50&page=1');
        }
        
        function saveFilter() {
            const filter = {
                startDate: document.getElementById('start-date').value,
                endDate: document.getElementById('end-date').value,
                year: document.getElementById('year-filter').value,
                month: document.getElementById('month-filter').value,
                type: document.getElementById('type-filter').value
            };
            localStorage.setItem('filter', JSON.stringify(filter));
        }
        
        function loadSavedFilter() {
            const savedFilter = localStorage.getItem('filter');
            if (savedFilter) {
                const filter = JSON.parse(savedFilter);
                document.getElementById('start-date').value = filter.startDate || '';
                document.getElementById('end-date').value = filter.endDate || '';
                document.getElementById('year-filter').value = filter.year || '';
                document.getElementById('month-filter').value = filter.month || '';
                document.getElementById('type-filter').value = filter.type || '';
            }
        }
        
        let pagination = null;
        
        function initPagination(currentPage, totalPages) {
            if (pagination) {
                pagination.update(currentPage, totalPages);
            } else {
                pagination = new Pagination('pagination-container', {
                    currentPage: currentPage,
                    totalPages: totalPages,
                    pageSize: 50,
                    onPageChange: function(page) { loadPageData(page); }
                });
            }
        }
        
        function loadPageData(page) {
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const year = document.getElementById('year-filter').value;
            const month = document.getElementById('month-filter').value;
            const type = document.getElementById('type-filter').value;
            
            let url = `/api/transactions?per_page=50&page=${page}`;
            if (startDate) url += '&start_date=' + startDate;
            if (endDate) url += '&end_date=' + endDate;
            if (year) url += '&year=' + year;
            if (month) url += '&month=' + month;
            if (type) url += '&type=' + type;
            
            loadFilteredTransactions(url);
        }
        
        async function loadTransactionForEdit(id) {
            try {
                const response = await fetch('/api/transactions/' + id);
                if (response.ok) {
                    const transaction = await response.json();
                    openEditModal(transaction);
                }
            } catch (error) {
                showToast('加载失败', 'error');
            }
        }
        
        function openEditModal(transaction) {
            document.querySelector('#edit-form input[name="id"]').value = transaction.id;
            document.querySelector('#edit-form input[name="date"]').value = transaction.date;
            document.querySelector('#edit-form select[name="type"]').value = transaction.type;
            document.querySelector('#edit-form input[name="category"]').value = transaction.category || '';
            document.querySelector('#edit-form input[name="amount"]').value = transaction.amount;
            document.querySelector('#edit-form textarea[name="description"]').value = transaction.description || '';
            document.querySelector('#edit-form textarea[name="remark"]').value = transaction.remark || '';
            document.getElementById('edit-modal').style.display = 'block';
        }
        
        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }
        
        async function handleEditSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const id = data.id;
            delete data.id;
            
            try {
                const response = await fetch(`/api/transactions/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showToast('修改成功');
                    closeEditModal();
                    loadSummaryData();
                    applyFilter();
                } else {
                    showToast('修改失败', 'error');
                }
            } catch (error) {
                showToast('修改失败', 'error');
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const editForm = document.getElementById('edit-form');
            if (editForm) { editForm.addEventListener('submit', handleEditSubmit); }
        });
        
        window.onclick = function(event) {
            if (event.target === document.getElementById('edit-modal')) { closeEditModal(); }
        }
    </script>
</body>
</html>
