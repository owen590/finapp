<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务系统</title>
    <script>
        function confirmLogout() {
            return confirm('确定要注销吗？注销后将需要重新登录。');
        }
    </script>
    <!-- ZUI 3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/zui@3/dist/css/zui.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=10?v=10?v=8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/entry.css') }}?v=10?v=10?v=8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pagination.css') }}?v=10?v=10">
</head>
<body>
    <div class="container">
        <header>
            <h1>财务系统</h1>
                                                                        <nav>
                <a href="{{ url_for('index') }}" class="active">首页</a>
                <a href="{{ url_for('entry') }}">录入</a>
                <a href="{{ url_for('accounts_page') }}">账户</a>
                <a href="{{ url_for('reports') }}">报表</a>
                <a href="{{ url_for('export') }}">导出</a>
                <a href="{{ url_for('users') }}">用户</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}" style="float: right;" onclick="return confirmLogout()">注销</a>
                <span style="float: right; margin-left: 20px; color: white;">欢迎，{{ current_user.username }}</span>
                {% else %}
                <a href="{{ url_for('login') }}" style="float: right;">登录</a>
                {% endif %}
            </nav>
        </header>

        <main>
            <section class="stats-section">
                <h2>财务统计</h2>
                <div class="stats-grid">
                    <div class="stat-card income">
                        <div class="stat-value" id="total-income">¥0.00</div>
                        <div class="stat-label">总收入</div>
                    </div>
                    <div class="stat-card expense">
                        <div class="stat-value" id="total-expense">¥0.00</div>
                        <div class="stat-label">总支出</div>
                    </div>
                    <div class="stat-card balance">
                        <div class="stat-value" id="balance">¥0.00</div>
                        <div class="stat-label">结余</div>
                    </div>
                </div>
            </section>

            <section class="filter-section">
                <h2>筛选条件</h2>
                <div class="filter-controls">
                    <input type="date" id="start-date" placeholder="开始日期">
                    <input type="date" id="end-date" placeholder="结束日期">
                    <select id="year-filter">
                        <option value="">全部年份</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                    <select id="month-filter">
                        <option value="">全部月份</option>
                        <option value="1">一月</option>
                        <option value="2">二月</option>
                        <option value="3">三月</option>
                        <option value="4">四月</option>
                        <option value="5">五月</option>
                        <option value="6">六月</option>
                        <option value="7">七月</option>
                        <option value="8">八月</option>
                        <option value="9">九月</option>
                        <option value="10">十月</option>
                        <option value="11">十一月</option>
                        <option value="12">十二月</option>
                    </select>
                    <select id="type-filter">
                        <option value="">全部收支</option>
                        <option value="收入">收入</option>
                        <option value="支出">支出</option>
                    </select>
                    <button onclick="applyFilter()" class="btn btn-primary">查询</button>
                    <button onclick="resetFilter()" class="btn btn-secondary">重置</button>
                </div>
            </section>

            <section class="recent-transactions">
                <h2>最近交易</h2>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>收支分类</th>
                                <th>明细分类</th>
                                <th>摘要</th>
                                <th>金额</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-table">
                        </tbody>
                    </table>
                </div>
                <!-- 分页控件 -->
                <div id="pagination-container"></div>
            </section>
        </main>

        </footer>
    </div>

    <!-- 编辑弹窗 -->
    <div id="edit-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>编辑交易</h2>
            <form id="edit-form" class="entry-form">
                <input type="hidden" name="id">
                <div class="form-row">
                    <div class="form-group">
                        <label>日期 <span class="required">*</span></label>
                        <input type="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label>类型 <span class="required">*</span></label>
                        <select name="type" required>
                            <option value="">请选择</option>
                            <option value="收入">收入</option>
                            <option value="支出">支出</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>明细分类 <span class="required">*</span></label>
                        <input type="text" name="category" list="category-list-edit" required placeholder="输入或选择类别">
                        <datalist id="category-list-edit">
                            <option value="投资款">
                            <option value="货款">
                            <option value="电费">
                            <option value="快递费">
                            <option value="工资">
                            <option value="充值">
                            <option value="设备">
                            <option value="材料">
                            <option value="费用">
                            <option value="房租">
                            <option value="其他">
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label>金额 <span class="required">*</span></label>
                        <input type="number" name="amount" step="0.01" min="0" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>摘要</label>
                        <textarea name="description" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>备注</label>
                        <textarea name="remark" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">保存修改</button>
                    <button type="button" class="btn-secondary" onclick="closeEditModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}?v=10?v=10"></script>
    <script src="{{ url_for('static', filename='js/pagination.js') }}?v=10?v=10"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 加载保存的筛选条件
            loadSavedFilter();
            // 应用筛选条件
            applyFilter();
        });
        
        async function loadRecentTransactions() {
            try {
                const response = await fetch('/finapp/api/transactions?per_page=50');
                const data = await response.json();
                
                const tableBody = document.getElementById('transactions-table');
                if (tableBody) {
                    tableBody.innerHTML = '';
                    
                    data.transactions.forEach(transaction => {
                        const row = document.createElement('tr');
                        const editBtn = document.createElement('button');
                        editBtn.className = 'btn-primary btn-sm';
                        editBtn.textContent = '编辑';
                        editBtn.onclick = function() {
                            loadTransactionForEdit(transaction.id);
                        };
                        
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn-danger btn-sm';
                        deleteBtn.textContent = '删除';
                        deleteBtn.onclick = function() {
                            confirmDelete(transaction.id);
                        };
                        
                        const actionCell = document.createElement('td');
                        const actionsContainer = document.createElement('div');
                        actionsContainer.className = 'table-actions';
                        actionsContainer.appendChild(editBtn);
                        actionsContainer.appendChild(deleteBtn);
                        actionCell.appendChild(actionsContainer);
                        
                        row.innerHTML = `
                            <td>${formatDate(transaction.date)}</td>
                            <td><span class="type-badge ${transaction.type}">${transaction.type}</span></td>
                            <td>${transaction.category || '-'}</td>
                            <td>${transaction.description || '-'}</td>
                            <td class="amount ${transaction.type}">${formatAmount(transaction.amount)}</td>
                            <td>${transaction.remark || '-'}</td>
                        `;
                        row.appendChild(actionCell);
                        tableBody.appendChild(row);
                    });
                }
                
                // 初始化分页控件
                initPagination(data.current_page, data.pages);
            } catch (error) {
                console.error('加载交易记录失败:', error);
            }
        }
        
        async function confirmDelete(id) {
            if (confirm('确定要删除这条记录吗？')) {
                try {
                    const response = await fetch('/finapp/api/transactions/' + id, {
                        method: 'DELETE',
                        credentials: 'include'
                    });
                    if (response.ok) {
                        alert('删除成功');
                        loadSummaryData();
                        loadRecentTransactions();
                    } else {
                        alert('删除失败');
                    }
                } catch (error) {
                    console.error('删除失败:', error);
                    alert('删除失败');
                }
            }
        }
        
        async function loadSummaryData(url = '/finapp/api/statistics') {
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (document.getElementById('total-income')) {
                    document.getElementById('total-income').textContent = formatAmount(data.total_income);
                }
                if (document.getElementById('total-expense')) {
                    document.getElementById('total-expense').textContent = formatAmount(data.total_expense);
                }
                if (document.getElementById('balance')) {
                    document.getElementById('balance').textContent = formatAmount(data.balance);
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }
        
        function applyFilter() {
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const year = document.getElementById('year-filter').value;
            const month = document.getElementById('month-filter').value;
            const type = document.getElementById('type-filter').value;
            
            // 保存筛选条件
            saveFilter();
            
            let url = '/finapp/api/transactions?per_page=50&page=1';
            let statsUrl = '/finapp/api/statistics';
            
            if (startDate) {
                url += '&start_date=' + startDate;
                statsUrl += '?start_date=' + startDate;
            }
            if (endDate) {
                url += '&end_date=' + endDate;
                statsUrl += (statsUrl.includes('?') ? '&' : '?') + 'end_date=' + endDate;
            }
            if (year) {
                url += '&year=' + year;
                statsUrl += (statsUrl.includes('?') ? '&' : '?') + 'year=' + year;
            }
            if (month) {
                url += '&month=' + month;
                statsUrl += (statsUrl.includes('?') ? '&' : '?') + 'month=' + month;
            }
            if (type) {
                url += '&type=' + type;
                statsUrl += (statsUrl.includes('?') ? '&' : '?') + 'type=' + type;
            }
            
            loadFilteredTransactions(url);
            loadSummaryData(statsUrl);
        }
        
        async function loadFilteredTransactions(url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const tableBody = document.getElementById('transactions-table');
                if (tableBody) {
                    tableBody.innerHTML = '';
                    
                    data.transactions.forEach(transaction => {
                        const row = document.createElement('tr');
                        const editBtn = document.createElement('button');
                        editBtn.className = 'btn-primary btn-sm';
                        editBtn.textContent = '编辑';
                        editBtn.onclick = function() {
                            loadTransactionForEdit(transaction.id);
                        };
                        
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn-danger btn-sm';
                        deleteBtn.textContent = '删除';
                        deleteBtn.onclick = function() {
                            confirmDelete(transaction.id);
                        };
                        
                        const actionCell = document.createElement('td');
                        const actionsContainer = document.createElement('div');
                        actionsContainer.className = 'table-actions';
                        actionsContainer.appendChild(editBtn);
                        actionsContainer.appendChild(deleteBtn);
                        actionCell.appendChild(actionsContainer);
                        
                        row.innerHTML = `
                            <td>${formatDate(transaction.date)}</td>
                            <td><span class="type-badge ${transaction.type}">${transaction.type}</span></td>
                            <td>${transaction.category || '-'}</td>
                            <td>${transaction.description || '-'}</td>
                            <td class="amount ${transaction.type}">${formatAmount(transaction.amount)}</td>
                            <td>${transaction.remark || '-'}</td>
                        `;
                        row.appendChild(actionCell);
                        tableBody.appendChild(row);
                    });
                }
                
                // 初始化分页控件
                initPagination(data.current_page, data.pages);
            } catch (error) {
                console.error('加载筛选交易记录失败:', error);
            }
        }
        
        function resetFilter() {
            document.getElementById('start-date').value = '';
            document.getElementById('end-date').value = '';
            document.getElementById('year-filter').value = '';
            document.getElementById('month-filter').value = '';
            document.getElementById('type-filter').value = '';
            // 清除保存的筛选条件
            localStorage.removeItem('filter');
            loadSummaryData();
            loadRecentTransactions();
        }
        
        // 保存筛选条件到localStorage
        function saveFilter() {
            const filter = {
                startDate: document.getElementById('start-date').value,
                endDate: document.getElementById('end-date').value,
                year: document.getElementById('year-filter').value,
                month: document.getElementById('month-filter').value,
                type: document.getElementById('type-filter').value
            };
            localStorage.setItem('filter', JSON.stringify(filter));
        }
        
        // 从localStorage加载筛选条件
        function loadSavedFilter() {
            const savedFilter = localStorage.getItem('filter');
            if (savedFilter) {
                const filter = JSON.parse(savedFilter);
                document.getElementById('start-date').value = filter.startDate || '';
                document.getElementById('end-date').value = filter.endDate || '';
                document.getElementById('year-filter').value = filter.year || '';
                document.getElementById('month-filter').value = filter.month || '';
                document.getElementById('type-filter').value = filter.type || '';
            }
        }
        
        // 分页控件实例
        let pagination = null;
        
        // 初始化分页控件
        function initPagination(currentPage, totalPages) {
            if (pagination) {
                pagination.update(currentPage, totalPages);
            } else {
                pagination = new Pagination('pagination-container', {
                    currentPage: currentPage,
                    totalPages: totalPages,
                    pageSize: 50,
                    onPageChange: function(page) {
                        loadPageData(page);
                    }
                });
            }
        }
        
        // 加载指定页的数据
        function loadPageData(page) {
            // 获取当前筛选条件
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const year = document.getElementById('year-filter').value;
            const month = document.getElementById('month-filter').value;
            const type = document.getElementById('type-filter').value;
            
            let url = `/finapp/api/transactions?per_page=50&page=${page}`;
            
            if (startDate) url += '&start_date=' + startDate;
            if (endDate) url += '&end_date=' + endDate;
            if (year) url += '&year=' + year;
            if (month) url += '&month=' + month;
            if (type) url += '&type=' + type;
            
            loadFilteredTransactions(url);
        }
        
        // 加载交易信息用于编辑
        async function loadTransactionForEdit(id) {
            try {
                const response = await fetch('/finapp/api/transactions/' + id);
                if (response.ok) {
                    const transaction = await response.json();
                    openEditModal(transaction);
                }
            } catch (error) {
                console.error('加载交易失败:', error);
                showToast('加载交易失败', 'error');
            }
        }
        
        // 打开编辑弹窗
        function openEditModal(transaction) {
            document.querySelector('#edit-form input[name="id"]').value = transaction.id;
            document.querySelector('#edit-form input[name="date"]').value = transaction.date;
            document.querySelector('#edit-form select[name="type"]').value = transaction.type;
            document.querySelector('#edit-form input[name="category"]').value = transaction.category || '';
            document.querySelector('#edit-form input[name="amount"]').value = transaction.amount;
            document.querySelector('#edit-form textarea[name="description"]').value = transaction.description || '';
            document.querySelector('#edit-form textarea[name="remark"]').value = transaction.remark || '';
            
            document.getElementById('edit-modal').style.display = 'block';
        }
        
        // 关闭编辑弹窗
        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }
        
        // 处理编辑表单提交
        async function handleEditSubmit(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const id = data.id;
            delete data.id;
            
            try {
                const response = await fetch(`/finapp/api/transactions/${id}`, {
                    method: 'PUT',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showToast('修改成功！');
                    closeEditModal();
                    loadSummaryData();
                    applyFilter();
                } else {
                    showToast('修改失败，请重试', 'error');
                }
            } catch (error) {
                console.error('修改交易失败:', error);
                showToast('修改失败，请检查网络连接', 'error');
            }
        }
        
        // 显示提示消息
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 绑定编辑表单提交事件
        document.addEventListener('DOMContentLoaded', function() {
            const editForm = document.getElementById('edit-form');
            if (editForm) {
                editForm.addEventListener('submit', handleEditSubmit);
            }
        });
        
        // 点击弹窗外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('edit-modal');
            if (event.target === modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
