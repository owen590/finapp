<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>总账 - 恒驰泵业财务系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>恒驰泵业财务系统</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/ledger" class="active">总账</a>
                <a href="/monthly">月度账单</a>
                <a href="/entry">数据录入</a>
            </nav>
        </header>

        <main>
            <section class="monthly-summary">
                <div class="summary-cards">
                    <div class="stat-card income">
                        <h3>入账总计</h3>
                        <p class="amount" id="total-income">¥0.00</p>
                    </div>
                    <div class="stat-card expense">
                        <h3>出账总计</h3>
                        <p class="amount" id="total-expense">¥0.00</p>
                    </div>
                    <div class="stat-card balance">
                        <h3>结余</h3>
                        <p class="amount" id="total-balance">¥0.00</p>
                    </div>
                </div>
            </section>

            <section class="filter-section">
                <h2>筛选条件</h2>
                <div class="filter-controls">
                    <select id="type-filter">
                        <option value="">全部收支</option>
                        <option value="入账">入账</option>
                        <option value="支出">支出</option>
                    </select>
                    <select id="year-filter">
                        <option value="">全部年份</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                    <select id="month-filter">
                        <option value="">全部月份</option>
                        <option value="1">一月</option>
                        <option value="2">二月</option>
                        <option value="3">三月</option>
                        <option value="4">四月</option>
                        <option value="5">五月</option>
                        <option value="6">六月</option>
                        <option value="7">七月</option>
                        <option value="8">八月</option>
                        <option value="9">九月</option>
                        <option value="10">十月</option>
                        <option value="11">十一月</option>
                        <option value="12">十二月</option>
                    </select>
                    <button onclick="applyFilter()">应用筛选</button>
                </div>
            </section>

            <section class="ledger-section">
                <div class="section-header">
                    <h2>交易记录</h2>
                    <button class="btn-primary" onclick="showAddModal()">添加交易</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>收支分类</th>
                                <th>明细分类</th>
                                <th>金额</th>
                                <th>摘要</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-table">
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination">
                </div>
            </section>
        </main>

        <div id="add-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modal-title">添加交易</h2>
                <form id="add-form">
                    <input type="hidden" id="transaction-id">
                    <div class="form-group">
                        <label>日期:</label>
                        <input type="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label>收支分类:</label>
                        <select name="type" required>
                            <option value="入账">入账</option>
                            <option value="支出">支出</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>明细分类:</label>
                        <input type="text" name="category" required>
                    </div>
                    <div class="form-group">
                        <label>金额:</label>
                        <input type="number" name="amount" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>摘要:</label>
                        <textarea name="description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>备注:</label>
                        <textarea name="remark"></textarea>
                    </div>
                    <button type="submit">保存</button>
                </form>
            </div>
        </div>

        <footer>
            <p>&copy; 2025 恒驰泵业财务系统</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        async function initLedgerPage() {
            await loadSummaryData();
            loadTransactions();
        }
        
        async function loadSummaryData() {
            const type = document.getElementById('type-filter')?.value || '';
            const year = document.getElementById('year-filter')?.value || '';
            const month = document.getElementById('month-filter')?.value || '';
            
            let url = '/api/statistics';
            const params = [];
            if (type) params.push(`type=${type}`);
            if (year) params.push(`year=${year}`);
            if (month) params.push(`month=${month}`);
            if (params.length > 0) url += '?' + params.join('&');
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (document.getElementById('total-income')) {
                    document.getElementById('total-income').textContent = formatAmount(data.total_income);
                }
                if (document.getElementById('total-expense')) {
                    document.getElementById('total-expense').textContent = formatAmount(data.total_expense);
                }
                if (document.getElementById('total-balance')) {
                    document.getElementById('total-balance').textContent = formatAmount(data.balance);
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }
        
        function applyFilter() {
            loadSummaryData();
            loadTransactions();
        }
        
        initLedgerPage();
    </script>
</body>
</html>
