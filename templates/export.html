<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出 - 财务系统</title>
    <script>
        function confirmLogout() {
            return confirm('确定要注销吗？注销后将需要重新登录。');
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=10?v=10">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/entry.css') }}?v=10?v=10">
</head>
<body>
    <div class="container">
        <header>
            <h1>财务系统</h1>
                                                                        <nav>
                <a href="{{ url_for('index') }}">首页</a>
                <a href="{{ url_for('entry') }}">录入</a>
                <a href="{{ url_for('accounts_page') }}">账户</a>
                <a href="{{ url_for('reports') }}">报表</a>
                <a href="{{ url_for('export') }}" class="active">导出</a>
                <a href="{{ url_for('users') }}">用户</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}" style="float: right;" onclick="return confirmLogout()">注销</a>
                <span style="float: right; margin-left: 20px; color: white;">欢迎，{{ current_user.username }}</span>
                {% else %}
                <a href="{{ url_for('login') }}" style="float: right;">登录</a>
                {% endif %}
            </nav>
        </header>

        <main>
            <section class="export-section">
                <div class="entry-card">
                    <h2>导出</h2>
                    <p class="hint">选择导出条件，导出交易记录到CSV文件</p>
                    
                    <form id="export-form" class="entry-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>收支分类</label>
                                <select id="type-filter">
                                    <option value="">全部</option>
                                    <option value="收入">收入</option>
                                    <option value="支出">支出</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>年份</label>
                                <select id="year-filter">
                                    <option value="">全部年份</option>
                                    <option value="2025">2025</option>
                                    <option value="2026">2026</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>月份</label>
                                <select id="month-filter">
                                    <option value="">全部月份</option>
                                    <option value="1">一月</option>
                                    <option value="2">二月</option>
                                    <option value="3">三月</option>
                                    <option value="4">四月</option>
                                    <option value="5">五月</option>
                                    <option value="6">六月</option>
                                    <option value="7">七月</option>
                                    <option value="8">八月</option>
                                    <option value="9">九月</option>
                                    <option value="10">十月</option>
                                    <option value="11">十一月</option>
                                    <option value="12">十二月</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-primary" onclick="exportData()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                导出CSV
                            </button>
                            <button type="reset" class="btn-secondary">重置</button>
                        </div>
                    </form>

                    <div id="export-info" class="export-info" style="display: none;">
                        <p>共导出 <span id="export-count">0</span> 条记录</p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2025 财务系统</p>
        </footer>
    </div>

    <script>
        function formatAmount(amount) {
            return '¥' + amount.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function exportData() {
            const type = document.getElementById('type-filter').value;
            const year = document.getElementById('year-filter').value;
            const month = document.getElementById('month-filter').value;
            
            let url = '/finapp/api/export?';
            const params = [];
            if (type) params.push(`type=${type}`);
            if (year) params.push(`year=${year}`);
            if (month) params.push(`month=${month}`);
            url += params.join('&');
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('导出失败');
                }
                
                const data = await response.json();
                
                let csvContent = '\uFEFF日期,收支分类,明细分类,摘要,金额,备注\n';
                
                data.transactions.forEach(t => {
                    const row = [
                        t.date,
                        t.type,
                        t.category,
                        t.description,
                        t.amount,
                        t.remark || ''
                    ];
                    csvContent += row.join(',') + '\n';
                });
                
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                
                const filename = `财务数据_${new Date().toISOString().slice(0,10)}.csv`;
                link.download = filename;
                
                link.click();
                URL.revokeObjectURL(link.href);
                
                document.getElementById('export-count').textContent = data.transactions.length;
                document.getElementById('export-info').style.display = 'block';
                
                alert(`成功导出 ${data.transactions.length} 条记录`);
            } catch (error) {
                console.error('导出失败:', error);
                alert('导出失败，请重试');
            }
        }
    </script>
</body>
</html>
